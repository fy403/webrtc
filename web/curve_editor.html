<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加速曲线编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            min-height: 600px;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar - Curve List */
        .sidebar {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar h2 {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #00d4ff;
        }

        .curve-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .curve-item {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .curve-item:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .curve-item.active {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .curve-item-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .curve-item-desc {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .curve-item-game {
            font-size: 0.75em;
            color: #7b2cbf;
        }

        .curve-item-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 0.75em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-delete {
            background: #ff4757;
            color: white;
        }

        .btn-delete:hover {
            background: #ff6b7a;
        }

        /* Main Content - Editor */
        .main-content {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .curve-title {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .curve-name-input {
            font-size: 1.5em;
            font-weight: bold;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 5px 10px;
            width: 300px;
        }

        .curve-name-input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .curve-name-input:disabled {
            border-color: transparent;
            background: transparent;
            cursor: default;
        }

        .curve-desc-input {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 12px;
            font-size: 0.9em;
            width: 400px;
        }

        .curve-desc-input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .curve-desc-input:disabled {
            border-color: transparent;
            cursor: default;
        }

        .editor-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-success {
            background: linear-gradient(90deg, #00b894, #00a085);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 184, 148, 0.3);
        }

        /* Canvas Area */
        .canvas-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        canvas {
            width: 100%;
            height: 400px;
            display: block;
            cursor: crosshair;
        }

        .canvas-legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 3px;
            border-radius: 2px;
        }

        .legend-color.curve {
            background: #00d4ff;
        }

        .legend-color.preview {
            background: #7b2cbf;
        }

        /* Point Editor */
        .point-editor {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
        }

        .point-editor h3 {
            margin-bottom: 15px;
            color: #00d4ff;
        }

        .point-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .point-row {
            display: grid;
            grid-template-columns: 80px 1fr 1fr 60px;
            gap: 10px;
            align-items: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .point-row:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .point-label {
            font-weight: bold;
            color: #00d4ff;
        }

        .point-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            padding: 8px 12px;
            width: 100%;
        }

        .point-input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .point-remove {
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .point-remove:hover {
            background: #ff6b7a;
        }

        .point-remove:disabled {
            background: rgba(255, 71, 87, 0.3);
            cursor: not-allowed;
        }

        .add-point-btn {
            width: 100%;
            margin-top: 10px;
            background: rgba(0, 212, 255, 0.2);
            border: 2px dashed #00d4ff;
            color: #00d4ff;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .add-point-btn:hover {
            background: rgba(0, 212, 255, 0.3);
        }

        /* Create New Curve Form */
        .create-form {
            background: rgba(0, 212, 255, 0.1);
            border: 2px dashed #00d4ff;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        .create-form input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            padding: 10px;
            margin-bottom: 10px;
        }

        .create-form input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00d4ff;
            color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transform: translateX(200%);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 加速曲线编辑器</h1>
        
        <div class="layout">
            <!-- Sidebar -->
            <div class="sidebar">
                <h2>曲线列表</h2>
                <div class="curve-list" id="curveList"></div>
                
                <div class="create-form" id="createForm">
                    <input type="text" id="newCurveName" placeholder="新曲线名称">
                    <button class="btn btn-primary" onclick="createNewCurve()">+ 创建新曲线</button>
                </div>

                <div style="margin-top: 15px;">
                    <button class="btn btn-success" style="width: 100%; margin-bottom: 10px;" onclick="exportCurve()">📋 导出到剪贴板</button>
                    <button class="btn btn-secondary" style="width: 100%;" onclick="showImportDialog()">📥 从剪贴板导入</button>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="main-content">
                <div class="editor-header">
                    <div class="curve-title">
                        <input type="text" class="curve-name-input" id="curveName" value="">
                        <input type="text" class="curve-desc-input" id="curveDesc" placeholder="曲线描述">
                    </div>
                    <div class="editor-actions">
                        <button class="btn btn-secondary" onclick="resetCurve()">重置</button>
                        <button class="btn btn-primary" onclick="saveCurve()">应用曲线</button>
                    </div>
                </div>
                
                <div class="canvas-container">
                    <canvas id="curveCanvas"></canvas>
                    <div class="canvas-legend">
                        <div class="legend-item">
                            <div class="legend-color curve"></div>
                            <span>当前曲线</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color preview"></div>
                            <span>预览曲线</span>
                        </div>
                    </div>
                </div>
                
                <div class="point-editor">
                    <h3>控制点编辑 (时间: ms, 速度: 0-1.0, 自由定位)</h3>
                    <div class="point-list" id="pointList"></div>
                    <button class="add-point-btn" onclick="addPoint()">+ 添加控制点</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="control_curves.js"></script>
    <script src="curve_manager.js"></script>
    <script src="curve_editor.js"></script>
</body>
</html>
