<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC 配置</title>
    <link href="style.css" rel="stylesheet">
    <link href="config.css" rel="stylesheet">
</head>
<body>
    <div class="config-page">
        <div class="config-header-with-sidebar">
            <!-- 左侧配置列表 -->
            <div class="config-sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-title">配置列表</div>
                    <button class="btn-icon-small" onclick="showCreateConfigModal()" title="新建配置">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18" height="18">
                            <line x1="12" x2="12" y1="5" y2="19"></line>
                            <line x1="5" x2="19" y1="12" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <div class="config-list" id="configList"></div>
                <div class="sidebar-footer">
                    <button class="btn btn-add" style="padding: 8px;" onclick="showCreateConfigModal()">+ 新建配置</button>
                </div>
            </div>

            <!-- 右侧配置内容 -->
            <div class="config-main">
                <div class="config-main-header">
                    <div class="config-name-display" id="currentConfigName">--</div>
                    <div class="config-actions">
                        <button class="btn btn-secondary" onclick="showRenameConfigModal()">重命名</button>
                        <button class="btn btn-secondary" onclick="copyCurrentConfig()">复制</button>
                        <button class="btn btn-secondary" onclick="deleteCurrentConfig()">删除</button>
                        <button class="btn btn-secondary" onclick="ConfigManager.resetCurrentConfig(); loadConfigToForm()">重置为默认</button>
                        <button class="btn btn-success" onclick="saveAndApply()">保存并应用</button>
                        <button class="btn btn-primary" onclick="applyOnly()">仅应用</button>
                        <button class="btn btn-danger" onclick="window.close()">关闭</button>
                    </div>
                </div>

                <div class="message" id="message"></div>

                <!-- 视频连接配置 -->
        <div class="config-section">
            <div class="section-title">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect height="16" rx="2" width="20" x="2" y="4" />
                    <polygon points="10 8 16 12 10 16 10 8" />
                </svg>
                视频连接配置
            </div>
            <div class="config-grid">
                <div class="form-group">
                    <label class="form-label">Signaling 服务器地址</label>
                    <input type="text" class="form-input" id="videoSignalingUrl" placeholder="ws://example.com:8000">
                </div>
                <div class="form-group">
                    <label class="form-label">远程设备 ID</label>
                    <input type="text" class="form-input" id="videoRemoteId" placeholder="cam_XXXXX">
                </div>
            </div>

            <div style="margin-top: 20px;">
                <label class="form-label">ICE 服务器配置</label>
                <div id="videoIceServers"></div>
                <button class="btn-add" onclick="addVideoIceServer()">+ 添加 ICE 服务器</button>
            </div>

            <div class="config-grid" style="margin-top: 20px;">
                <div class="form-group">
                    <label class="form-label">Bundle Policy</label>
                    <select class="form-select" id="videoBundlePolicy">
                        <option value="max-bundle">max-bundle</option>
                        <option value="balanced">balanced</option>
                        <option value="max-compat">max-compat</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">RTCP Mux Policy</label>
                    <select class="form-select" id="videoRtcpMuxPolicy">
                        <option value="require">require</option>
                        <option value="negotiate">negotiate</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Encoded Insertable Streams</label>
                    <select class="form-select" id="videoEncodedInsertableStreams">
                        <option value="false">禁用</option>
                        <option value="true">启用</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 视频参数配置 -->
        <div class="config-section">
            <div class="section-title">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect height="16" rx="2" width="20" x="2" y="4" />
                    <circle cx="12" cy="12" r="4" />
                </svg>
                视频参数配置
            </div>
            <div class="config-grid">
                <div class="form-group">
                    <label class="form-label">分辨率</label>
                    <select class="form-select" id="videoResolution">
                        <option value="640x480">640x480</option>
                        <option value="1280x720">1280x720</option>
                        <option value="1920x1080">1920x1080</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">帧率 (FPS)</label>
                    <select class="form-select" id="videoFps">
                        <option value="10">10</option>
                        <option value="15">15</option>
                        <option value="30">30</option>
                        <option value="60">60</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">码率 (bps)</label>
                    <select class="form-select" id="videoBitrate">
                        <option value="1000000">1 Mbps</option>
                        <option value="2000000">2 Mbps</option>
                        <option value="5000000">4 Mbps</option>
                        <option value="8000000">8 Mbps</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">视频格式</label>
                    <select class="form-select" id="videoFormat">
                        <option value="mjpeg">MJPEG</option>
                        <option value="yuyv422">YUYV422</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 数据连接配置 -->
        <div class="config-section">
            <div class="section-title">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M4 4h16v16H4z" />
                    <path d="M8 8h8v8H8z" />
                </svg>
                数据连接配置
            </div>
            <div class="config-grid">
                <div class="form-group">
                    <label class="form-label">Signaling 服务器地址</label>
                    <input type="text" class="form-input" id="dataSignalingUrl" placeholder="ws://example.com:8000">
                </div>
                <div class="form-group">
                    <label class="form-label">远程设备 ID</label>
                    <input type="text" class="form-input" id="dataRemoteId" placeholder="data_XXXXX">
                </div>
            </div>

            <div style="margin-top: 20px;">
                <label class="form-label">ICE 服务器配置</label>
                <div id="dataIceServers"></div>
                <button class="btn-add" onclick="addDataIceServer()">+ 添加 ICE 服务器</button>
            </div>
        </div>
    </div>
    </div>

    <!-- 新建配置模态框 -->
    <div class="modal-overlay" id="createConfigModal">
        <div class="modal">
            <div class="modal-header">新建配置</div>
            <div class="form-group">
                <label class="form-label">配置名称</label>
                <input type="text" class="form-input" id="newConfigName" placeholder="请输入配置名称">
            </div>
            <div class="form-group">
                <label class="form-label">配置描述（可选）</label>
                <input type="text" class="form-input" id="newConfigDesc" placeholder="请输入配置描述">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideCreateConfigModal()">取消</button>
                <button class="btn btn-primary" onclick="createConfig()">确定</button>
            </div>
        </div>
    </div>

    <!-- 重命名配置模态框 -->
    <div class="modal-overlay" id="renameConfigModal">
        <div class="modal">
            <div class="modal-header">重命名配置</div>
            <div class="form-group">
                <label class="form-label">新名称</label>
                <input type="text" class="form-input" id="renameConfigName" placeholder="请输入新名称">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideRenameConfigModal()">取消</button>
                <button class="btn btn-primary" onclick="renameConfig()">确定</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // 渲染配置列表
        function renderConfigList() {
            const configList = document.getElementById('configList');
            const configs = ConfigManager.configs;
            const currentName = ConfigManager.getCurrentConfigName();

            configList.innerHTML = '';

            Object.keys(configs).forEach(name => {
                const config = configs[name];
                const isActive = name === currentName;

                const item = document.createElement('div');
                item.className = `config-item ${isActive ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="config-item-name">${escapeHtml(name)}</div>
                    <div class="config-item-desc">${escapeHtml(config.description || '无描述')}</div>
                    <div class="config-item-actions">
                        <button class="btn-icon-small" onclick="event.stopPropagation(); switchConfig('${escapeHtml(name)}')" title="切换到此配置">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </button>
                        <button class="btn-icon-small" onclick="event.stopPropagation(); copyConfig('${escapeHtml(name)}')" title="复制配置">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>
                `;
                item.addEventListener('click', () => switchConfig(name));
                configList.appendChild(item);
            });
        }

        // 切换配置
        function switchConfig(name) {
            ConfigManager.switchConfig(name);
            loadConfigToForm();
            renderConfigList();
            showMessage(`已切换到配置: ${name}`, 'success');
        }

        // 显示当前配置名称
        function updateCurrentConfigDisplay() {
            const name = ConfigManager.getCurrentConfigName();
            document.getElementById('currentConfigName').textContent = name;
        }

        // 加载配置到表单
        function loadConfigToForm() {
            const config = ConfigManager.getCurrentConfig();
            updateCurrentConfigDisplay();

            if (!config) return;

            // 视频配置
            document.getElementById('videoSignalingUrl').value = config.video.signalingUrl || '';
            document.getElementById('videoRemoteId').value = config.video.remoteId || '';
            document.getElementById('videoBundlePolicy').value = config.video.bundlePolicy || 'max-bundle';
            document.getElementById('videoRtcpMuxPolicy').value = config.video.rtcpMuxPolicy || 'require';
            document.getElementById('videoEncodedInsertableStreams').value = config.video.encodedInsertableStreams ? 'true' : 'false';

            // 视频参数配置
            const videoConfig = config.video.videoConfig || {};
            document.getElementById('videoResolution').value = videoConfig.resolution || '640x480';
            document.getElementById('videoFps').value = videoConfig.fps || 30;
            document.getElementById('videoBitrate').value = videoConfig.bitrate || 8000000;
            document.getElementById('videoFormat').value = videoConfig.format || 'yuyv422';

            // 视频 ICE 服务器
            const videoIceContainer = document.getElementById('videoIceServers');
            videoIceContainer.innerHTML = '';
            if (config.video.iceServers && config.video.iceServers.length > 0) {
                config.video.iceServers.forEach((server, index) => {
                    addIceServerElement(videoIceContainer, server, 'video', index);
                });
            }

            // 数据配置
            document.getElementById('dataSignalingUrl').value = config.data.signalingUrl || '';
            document.getElementById('dataRemoteId').value = config.data.remoteId || '';

            // 数据 ICE 服务器
            const dataIceContainer = document.getElementById('dataIceServers');
            dataIceContainer.innerHTML = '';
            if (config.data.iceServers && config.data.iceServers.length > 0) {
                config.data.iceServers.forEach((server, index) => {
                    addIceServerElement(dataIceContainer, server, 'data', index);
                });
            }
        }

        // 显示新建配置模态框
        function showCreateConfigModal() {
            document.getElementById('newConfigName').value = '';
            document.getElementById('newConfigDesc').value = '';
            document.getElementById('createConfigModal').classList.add('active');
        }

        // 隐藏新建配置模态框
        function hideCreateConfigModal() {
            document.getElementById('createConfigModal').classList.remove('active');
        }

        // 创建配置
        function createConfig() {
            const name = document.getElementById('newConfigName').value.trim();
            const desc = document.getElementById('newConfigDesc').value.trim();

            if (!name) {
                showMessage('请输入配置名称', 'error');
                return;
            }

            try {
                ConfigManager.createConfig(name, desc);
                hideCreateConfigModal();
                renderConfigList();
                switchConfig(name);
                showMessage('配置创建成功', 'success');
            } catch (e) {
                showMessage(e.message, 'error');
            }
        }

        // 显示重命名配置模态框
        function showRenameConfigModal() {
            const currentName = ConfigManager.getCurrentConfigName();
            document.getElementById('renameConfigName').value = currentName;
            document.getElementById('renameConfigModal').classList.add('active');
        }

        // 隐藏重命名配置模态框
        function hideRenameConfigModal() {
            document.getElementById('renameConfigModal').classList.remove('active');
        }

        // 重命名配置
        function renameConfig() {
            const newName = document.getElementById('renameConfigName').value.trim();
            const oldName = ConfigManager.getCurrentConfigName();

            if (!newName) {
                showMessage('请输入新名称', 'error');
                return;
            }

            try {
                ConfigManager.renameConfig(oldName, newName);
                hideRenameConfigModal();
                renderConfigList();
                updateCurrentConfigDisplay();
                showMessage('配置重命名成功', 'success');
            } catch (e) {
                showMessage(e.message, 'error');
            }
        }

        // 复制当前配置
        function copyCurrentConfig() {
            const currentName = ConfigManager.getCurrentConfigName();
            const newName = `${currentName}_copy`;

            try {
                ConfigManager.copyConfig(currentName, newName);
                renderConfigList();
                switchConfig(newName);
                showMessage('配置复制成功', 'success');
            } catch (e) {
                showMessage(e.message, 'error');
            }
        }

        // 复制指定配置
        function copyConfig(name) {
            const newName = `${name}_copy`;

            try {
                ConfigManager.copyConfig(name, newName);
                renderConfigList();
                switchConfig(newName);
                showMessage('配置复制成功', 'success');
            } catch (e) {
                showMessage(e.message, 'error');
            }
        }

        // 删除当前配置
        function deleteCurrentConfig() {
            const name = ConfigManager.getCurrentConfigName();

            if (Object.keys(ConfigManager.configs).length === 1) {
                showMessage('不能删除最后一个配置', 'error');
                return;
            }

            if (confirm(`确定要删除配置 "${name}" 吗？`)) {
                try {
                    ConfigManager.deleteConfig(name);
                    renderConfigList();
                    loadConfigToForm();
                    showMessage('配置删除成功', 'success');
                } catch (e) {
                    showMessage(e.message, 'error');
                }
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 添加 ICE 服务器元素
        function addIceServerElement(container, server, type, index) {
            const div = document.createElement('div');
            div.className = 'ice-server-item';
            div.dataset.index = index;
            div.dataset.type = type;

            const urls = server.urls || [];
            const urlValue = Array.isArray(urls) ? urls.join(', ') : urls;

            div.innerHTML = `
                <div class="ice-server-header">
                    <span class="ice-server-title">ICE 服务器 #${index + 1}</span>
                    <button class="btn-icon" onclick="removeIceServer('${type}', ${index})">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18" height="18">
                            <line x1="18" x2="6" y1="6" y2="18"></line>
                            <line x1="6" x2="18" y1="6" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="form-group">
                    <label class="form-label">URLs (多个用逗号分隔)</label>
                    <input type="text" class="form-input" value="${urlValue}" placeholder="stun:stun.example.com:19302, turn:turn.example.com:3478?transport=udp">
                </div>
                <div class="form-group">
                    <label class="form-label">用户名 (TURN)</label>
                    <input type="text" class="form-input" value="${server.username || ''}" placeholder="username">
                </div>
                <div class="form-group">
                    <label class="form-label">密码 (TURN)</label>
                    <input type="password" class="form-input" value="${server.credential || ''}" placeholder="credential">
                </div>
            `;
            container.appendChild(div);
        }

        // 添加视频 ICE 服务器
        function addVideoIceServer() {
            const container = document.getElementById('videoIceServers');
            const index = container.children.length;
            addIceServerElement(container, { urls: [] }, 'video', index);
        }

        // 添加数据 ICE 服务器
        function addDataIceServer() {
            const container = document.getElementById('dataIceServers');
            const index = container.children.length;
            addIceServerElement(container, { urls: [] }, 'data', index);
        }

        // 删除 ICE 服务器
        function removeIceServer(type, index) {
            const container = document.getElementById(`${type}IceServers`);
            const item = container.querySelector(`[data-index="${index}"]`);
            if (item) {
                item.remove();
                // 更新索引
                const items = container.querySelectorAll('.ice-server-item');
                items.forEach((item, i) => {
                    item.dataset.index = i;
                    const title = item.querySelector('.ice-server-title');
                    if (title) title.textContent = `ICE 服务器 #${i + 1}`;
                });
            }
        }

        // 从表单获取 ICE 服务器配置
        function getIceServersFromForm(type) {
            const container = document.getElementById(`${type}IceServers`);
            const items = container.querySelectorAll('.ice-server-item');
            const iceServers = [];

            items.forEach(item => {
                const urlsInput = item.querySelector('.form-input');
                const usernameInput = item.querySelectorAll('.form-input')[1];
                const credentialInput = item.querySelectorAll('.form-input')[2];

                const urlsValue = urlsInput.value.trim();
                if (urlsValue) {
                    const urls = urlsValue.split(',').map(url => url.trim()).filter(url => url);
                    const server = { urls };
                    if (usernameInput.value.trim()) server.username = usernameInput.value.trim();
                    if (credentialInput.value.trim()) server.credential = credentialInput.value.trim();
                    iceServers.push(server);
                }
            });

            return iceServers;
        }

        // 保存并应用配置
        function saveAndApply() {
            try {
                const currentName = ConfigManager.getCurrentConfigName();

                // 收集视频配置
                const videoConfig = {
                    signalingUrl: document.getElementById('videoSignalingUrl').value.trim(),
                    remoteId: document.getElementById('videoRemoteId').value.trim(),
                    iceServers: getIceServersFromForm('video'),
                    bundlePolicy: document.getElementById('videoBundlePolicy').value,
                    rtcpMuxPolicy: document.getElementById('videoRtcpMuxPolicy').value,
                    encodedInsertableStreams: document.getElementById('videoEncodedInsertableStreams').value === 'true',
                    videoConfig: {
                        resolution: document.getElementById('videoResolution').value,
                        fps: parseInt(document.getElementById('videoFps').value),
                        bitrate: parseInt(document.getElementById('videoBitrate').value),
                        format: document.getElementById('videoFormat').value
                    }
                };

                // 收集数据配置
                const dataConfig = {
                    signalingUrl: document.getElementById('dataSignalingUrl').value.trim(),
                    remoteId: document.getElementById('dataRemoteId').value.trim(),
                    iceServers: getIceServersFromForm('data')
                };

                // 更新配置
                ConfigManager.updateVideoConfig(videoConfig);
                ConfigManager.updateDataConfig(dataConfig);

                showMessage('配置已保存', 'success');

                // 通知主页面配置已更新
                localStorage.setItem('webrtc_config_updated', Date.now().toString());

                setTimeout(() => {
                    window.close();
                }, 800);
            } catch (e) {
                console.error('保存配置失败:', e);
                showMessage('保存配置失败: ' + e.message, 'error');
            }
        }

        // 仅应用配置（不保存）
        function applyOnly() {
            try {
                const videoConfig = {
                    signalingUrl: document.getElementById('videoSignalingUrl').value.trim(),
                    remoteId: document.getElementById('videoRemoteId').value.trim(),
                    iceServers: getIceServersFromForm('video'),
                    bundlePolicy: document.getElementById('videoBundlePolicy').value,
                    rtcpMuxPolicy: document.getElementById('videoRtcpMuxPolicy').value,
                    encodedInsertableStreams: document.getElementById('videoEncodedInsertableStreams').value === 'true',
                    videoConfig: {
                        resolution: document.getElementById('videoResolution').value,
                        fps: parseInt(document.getElementById('videoFps').value),
                        bitrate: parseInt(document.getElementById('videoBitrate').value),
                        format: document.getElementById('videoFormat').value
                    }
                };

                const dataConfig = {
                    signalingUrl: document.getElementById('dataSignalingUrl').value.trim(),
                    remoteId: document.getElementById('dataRemoteId').value.trim(),
                    iceServers: getIceServersFromForm('data')
                };

                ConfigManager.updateVideoConfig(videoConfig);
                ConfigManager.updateDataConfig(dataConfig);

                showMessage('配置已应用', 'success');

                // 通知主页面配置已更新
                localStorage.setItem('webrtc_config_updated', Date.now().toString());

                setTimeout(() => {
                    window.close();
                }, 500);
            } catch (e) {
                console.error('应用配置失败:', e);
                showMessage('应用配置失败: ' + e.message, 'error');
            }
        }

        // 显示消息
        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = 'message ' + type;
            message.style.display = 'block';
            setTimeout(() => {
                message.style.display = 'none';
            }, 3000);
        }

        // 页面加载时加载配置
        window.addEventListener('load', function() {
            ConfigManager.init();
            renderConfigList();
            loadConfigToForm();
        });
    </script>
</body>
</html>
